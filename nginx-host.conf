# Конфигурация Nginx на Ubuntu-хосте для проксирования на поддомен
# Поместить: /etc/nginx/sites-available/ogonyek
# Симлинк: sudo ln -s /etc/nginx/sites-available/ogonyek /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ogonyek.yourdomain.com;   # <-- замените на свой поддомен

    # Опционально: перенаправление HTTP -> HTTPS (если есть SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Блок HTTPS (certbot заполняет автоматически после sudo certbot --nginx)
# server {
#     listen 443 ssl;
#     server_name ogonyek.yourdomain.com;
#     ...
