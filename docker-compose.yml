services:

  app:
    build: .
    container_name: ogonyek_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./ogonyek:/var/www/html
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ogonyek_net

  db:
    image: mysql:8.0
    container_name: ogonyek_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:6061:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./ogonyek/ogonyok_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ogonyek_net

  nginx:
    image: nginx:stable-alpine
    container_name: ogonyek_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:6060:80"
    volumes:
      - ./ogonyek:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ogonyek_net

volumes:
  db_data:

networks:
  ogonyek_net:
    driver: bridge
